<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DMS Launcher</title>
  <style>
    :root {
      --bg: #111111;
      --panel: #1b1b1b;
      --border: #343434;
      --text: #f3f3f3;
      --muted: #a7a7a7;
      --accent: #f5f5f5;
      --accent-text: #111111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #232323 0%, #111111 55%),
        linear-gradient(180deg, #101010 0%, #171717 100%);
      color: var(--text);
      font: 16px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(680px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(27, 27, 27, 0.92);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .dropzone {
      width: 100%;
      min-height: 180px;
      padding: 20px;
      border: 2px dashed #4a4a4a;
      border-radius: 16px;
      background: #151515;
      color: var(--muted);
      display: grid;
      place-items: center;
      text-align: center;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
      cursor: pointer;
    }

    .dropzone.dragover {
      border-color: #d6d6d6;
      background: #202020;
      color: var(--text);
    }

    .dropzone strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 18px;
    }

    input[type="file"] {
      display: none;
    }

    .files {
      margin: 18px 0 20px;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .files li {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #131313;
      color: var(--text);
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .progress {
      margin-top: 16px;
      display: grid;
      gap: 8px;
    }

    .loader-wrap {
      display: none;
      align-items: center;
      gap: 12px;
      min-height: 22px;
    }

    .loader-wrap.active {
      display: flex;
    }

    .loader {
      width: 18px;
      height: 18px;
      border: 2px solid #4a4a4a;
      border-top-color: #f5f5f5;
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: var(--accent-text);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .detail {
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>DMS Launcher</h1>
    <p>Glisse tes documents ici ou clique pour les sélectionner, puis lance via l'API locale.</p>

    <label class="dropzone" id="dropzone" for="file-input">
      <span>
        <strong>Déposer les documents</strong>
        PDF, DOCX, TXT, PNG, WEBP, XLSX
      </span>
    </label>
    <input id="file-input" type="file" multiple>

    <ul class="files" id="files-list"></ul>

    <div class="actions">
      <button id="launch-btn" type="button" disabled>Lancer</button>
      <span class="status" id="status">Aucun document sélectionné.</span>
    </div>

    <div class="progress">
      <div class="loader-wrap" id="loader-wrap">
        <div class="loader" aria-hidden="true"></div>
        <div class="detail" id="progress-detail"></div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = (
      window.location.protocol.startsWith("http") && window.location.port === "8765"
    ) ? window.location.origin : "http://127.0.0.1:8765";
    const REQUIRED_API_VERSION = "dms-local-api-2026-03-31-v2";

    const input = document.getElementById("file-input");
    const dropzone = document.getElementById("dropzone");
    const filesList = document.getElementById("files-list");
    const launchBtn = document.getElementById("launch-btn");
    const status = document.getElementById("status");
    const loaderWrap = document.getElementById("loader-wrap");
    const progressDetail = document.getElementById("progress-detail");

    let selectedFiles = [];
    let statusTimer = null;
    let isRunning = false;

    function setLoader(active) {
      loaderWrap.classList.toggle("active", Boolean(active));
    }

    function stopPolling() {
      if (statusTimer) {
        clearInterval(statusTimer);
        statusTimer = null;
      }
    }

    async function refreshJobStatus() {
      try {
        const response = await fetch(`${API_BASE}/api/status`);
        const data = await response.json();
        if (!data.api_version || data.api_version !== REQUIRED_API_VERSION) {
          isRunning = false;
          status.textContent = "Backend API trop ancien sur le port 8765.";
          progressDetail.textContent = "Redémarre local_api.py pour charger la version corrigée.";
          launchBtn.disabled = selectedFiles.length === 0;
          stopPolling();
          return;
        }
        if (!data || data.status === "idle") {
          return;
        }
        if (data.status === "running") {
          isRunning = true;
          launchBtn.disabled = true;
          setLoader(true);
          status.textContent = `Traitement en cours... job=${data.job_id}`;
          progressDetail.textContent = "Traitement en cours...";
          return;
        }
        if (data.status === "completed") {
          isRunning = false;
          setLoader(false);
          status.textContent = `Traitement terminé. job=${data.job_id}`;
          progressDetail.textContent = "Le traitement est fini.";
          launchBtn.disabled = selectedFiles.length === 0;
          stopPolling();
          return;
        }
        if (data.status === "failed") {
          isRunning = false;
          setLoader(false);
          status.textContent = `Traitement terminé en erreur (code ${data.returncode}). job=${data.job_id}`;
          progressDetail.textContent = data.last_log_line || "Le traitement a échoué.";
          launchBtn.disabled = selectedFiles.length === 0;
          stopPolling();
        }
      } catch (error) {
        isRunning = false;
        setLoader(false);
        status.textContent = `API locale indisponible: ${error.message}`;
        progressDetail.textContent = `Backend attendu sur ${API_BASE}`;
        launchBtn.disabled = selectedFiles.length === 0;
        stopPolling();
      }
    }

    function renderFiles() {
      filesList.innerHTML = "";
      selectedFiles.forEach((file) => {
        const item = document.createElement("li");
        item.textContent = `${file.name} (${file.size} octets)`;
        filesList.appendChild(item);
      });
      launchBtn.disabled = selectedFiles.length === 0 || isRunning;
      if (!isRunning) {
        status.textContent = selectedFiles.length
          ? `${selectedFiles.length} document(s) prêt(s).`
          : "Aucun document sélectionné.";
      }
      if (!selectedFiles.length && !isRunning) {
        setLoader(false);
        progressDetail.textContent = "";
      }
    }

    function setFiles(fileList) {
      selectedFiles = Array.from(fileList || []);
      renderFiles();
    }

    input.addEventListener("change", () => setFiles(input.files));

    ["dragenter", "dragover"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.add("dragover");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.remove("dragover");
      });
    });

    dropzone.addEventListener("drop", (event) => {
      setFiles(event.dataTransfer.files);
    });

    launchBtn.addEventListener("click", async () => {
      if (!selectedFiles.length) {
        return;
      }

      try {
        const statusResponse = await fetch(`${API_BASE}/api/status`);
        const statusPayload = await statusResponse.json();
        if (!statusPayload.api_version || statusPayload.api_version !== REQUIRED_API_VERSION) {
          status.textContent = "Backend API trop ancien sur le port 8765.";
          progressDetail.textContent = "Arrête l'ancien serveur et relance local_api.py.";
          return;
        }
      } catch (error) {
        status.textContent = `API locale indisponible: ${error.message}`;
        progressDetail.textContent = `Backend attendu sur ${API_BASE}`;
        return;
      }

      const formData = new FormData();
      selectedFiles.forEach((file) => {
        formData.append("files", file, file.name);
      });

      isRunning = true;
      launchBtn.disabled = true;
      setLoader(true);
      status.textContent = `Upload et lancement de ${selectedFiles.length} document(s)...`;
      progressDetail.textContent = "Traitement en cours...";

      try {
        const response = await fetch(`${API_BASE}/api/run`, {
          method: "POST",
          body: formData
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || "Echec du lancement");
        }
        setLoader(true);
        status.textContent = `Pipeline lancé. job=${payload.job.job_id}`;
        progressDetail.textContent = "Traitement en cours...";
        stopPolling();
        statusTimer = setInterval(refreshJobStatus, 1500);
        refreshJobStatus();
      } catch (error) {
        isRunning = false;
        setLoader(false);
        status.textContent = `Erreur: ${error.message}`;
        progressDetail.textContent = `Requête envoyée vers ${API_BASE}`;
      } finally {
        renderFiles();
      }
    });
  </script>
</body>
</html>
